name: Kali-SSH-Recon

on:
  workflow_dispatch:

jobs:
  kali-ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install Kali Linux & SSH
        run: |
          sudo apt update
          sudo apt install -y openssh-server

      - name: Setup SSH Password
        run: |
          # هنا بنعمل يوزر وبنخلي الباسورد kali123
          echo "root:kali123" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo service ssh start

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Establish Tailscale Connection
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          sudo tailscale up --authkey=$TAILSCALE_AUTH_KEY --hostname=kali-ssh-runner
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Display Connection Info
        run: |
          echo "=== SSH CONNECTION INFO ==="
          echo "Command: ssh root@${{ env.TAILSCALE_IP }}"
          echo "Password: kali123"
          echo "==========================="

      - name: Maintain Connection
        run: |
          while true; do
            echo "[$(date)] SSH Server Active..."
            sleep 300
          done
